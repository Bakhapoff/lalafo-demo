<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Объявления Lalafo</title>
    <link rel="stylesheet" th:href="@{/css/ads.css}">
</head>
<body>

<h1>Объявления Lalafo</h1>

<div class="grid" th:if="${not #lists.isEmpty(ads)}">
    <a class="card" th:each="ad : ${ads}" th:href="'https://lalafo.kg' + ${ad.url()}" target="_blank">

        <img th:if="${ad.images() != null && !ad.images().isEmpty()}" th:src="${ad.images().get(0).thumbnail_url()}" th:alt="${ad.title()}"/>
        <img th:unless="${ad.images() != null && !ad.images().isEmpty()}" src="https://via.placeholder.com/370x180?text=Нет+фото" alt="Нет фото"/>

        <div class="card-body">
            <p class="card-title" th:text="${ad.title()}"></p>

            <p class="card-price"
               th:text="${ad.price() != null ? #numbers.formatDecimal(ad.price(), 0, 'COMMA', 0, 'POINT') + ' ' + ad.currency() : 'Договорная'}">
            </p>

            <div class="card-footer">
                <span class="card-city" th:text="${ad.city()}"></span>
                <span class="card-date"
                      th:text="${#dates.format(new java.util.Date(ad.created_time() * 1000), 'dd.MM.yyyy')}">
                </span>
            </div>
        </div>
    </a>
</div>

<div th:if="${#lists.isEmpty(ads)}" class="no-results">
    <p>Объявления не найдены</p>
</div>

<div class="pagination" th:if="${currentPage != null}">
    <a th:if="${currentPage > 1}" th:href="@{/test-result(page=${currentPage - 1})}" class="page-btn">← Назад</a>
    <span th:if="${currentPage == 1}" class="page-btn disabled">← Назад</span>

    <span class="page-info">Страница <b th:text="${currentPage}"></b></span>

    <a th:href="@{/test-result(page=${currentPage + 1})}" class="page-btn">Вперёд →</a>
</div>

</body>
</html>
